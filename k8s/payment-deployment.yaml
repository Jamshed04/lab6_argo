apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8094

          envFrom:
            - secretRef:
                name: payment-app-secret
            - secretRef:
                name: kafka-secret
            - secretRef:
                name: payment-postgres-secret

          env:
            - name: HTTP_PORT
              value: "8094"
            - name: YOOKASSA_BASE_URL
              value: "https://api.yookassa.ru/v3"
            - name: RETURN_URL
              value: "https://socoldworld.com"
          livenessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8094
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
spec:
  selector:
    app: payment-service
  ports:
    - protocol: TCP
      port: 8094
      targetPort: 8094
  type: ClusterIP